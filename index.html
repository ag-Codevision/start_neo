<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0b0f19">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="_NEO">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Google Fonts: Outfit and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <title>_NEO Assistant</title>
    <style>
        :root {
            --color-background: #0b0f19;
            --color-glass: rgba(15, 23, 42, 0.4);
            --color-glass-border: rgba(255, 255, 255, 0.05);
            --accent: #0ea5e9;
        }
        body { 
            font-family: 'Inter', system-ui, Avenir, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: radial-gradient(circle at center, #111424 0%, #06080F 80%); 
            color: #f8fafc; 
            margin: 0; 
            text-align: center; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }
        .brand-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .brand-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent), 0 0 20px rgba(14, 165, 233, 0.5);
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); box-shadow: 0 0 5px var(--accent); }
        }
        p { 
            font-size: 15px; 
            color: #94a3b8; 
            margin-bottom: 40px; 
            max-width: 400px; 
            line-height: 1.6; 
            font-weight: 400;
        }
        .btn { 
            display: flex; 
            padding: 16px 28px; 
            font-size: 15px; 
            font-weight: 500; 
            border-radius: 16px; 
            cursor: pointer; 
            text-decoration: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid var(--color-glass-border); 
            width: 100%; 
            box-sizing: border-box; 
            justify-content: center; 
            align-items: center; 
            gap: 12px; 
            font-family: inherit;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            outline: none;
        }
        .btn-primary { 
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.9) 0%, rgba(67, 56, 202, 0.9) 100%); 
            color: white; 
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .btn-primary:hover {
             box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
             transform: translateY(-1px);
        }
        .btn-secondary { 
            background: var(--color-glass); 
            color: #cbd5e1; 
        }
        .btn-secondary:hover { 
            background: rgba(30, 41, 59, 0.6);
            color: white;
            border-color: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }
        .input-group {
            margin-bottom: 20px;
            width: 100%;
        }
        input[type="password"] {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--color-glass-border);
            border-radius: 16px;
            color: white;
            font-family: inherit;
            font-size: 16px;
            box-sizing: border-box;
            text-align: center;
            transition: all 0.3s;
            outline: none;
        }
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 10px;
            display: none;
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        #loading { 
            margin-top: 30px; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        .spinner { 
            border: 3px solid rgba(255,255,255,0.05); 
            border-top: 3px solid rgba(14, 165, 233, 0.8); 
            border-radius: 50%; 
            width: 48px; 
            height: 48px; 
            animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite; 
            margin-bottom: 20px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .decor-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: -1;
        }
        .decor-1 { top: -10%; left: -10%; width: 300px; height: 300px; background: #6366f1; }
        .decor-2 { bottom: -20%; right: -10%; width: 400px; height: 400px; background: #0ea5e9; }
    </style>
</head>
<body>
    <div class="decor-circle decor-1"></div>
    <div class="decor-circle decor-2"></div>
    
    <!-- Password Screen -->
    <div id="authScreen" class="container">
        <h1 class="brand-logo">_NEO <div class="brand-dot"></div></h1>
        <p>Acesso Restrito ao Sistema</p>
        <div class="input-group">
            <input type="password" id="passInput" placeholder="Digite a chave mestra..." autocomplete="current-password">
            <div id="errorMsg" class="error-msg">Acesso negado. Chave incorreta.</div>
        </div>
        <button id="loginBtn" class="btn btn-primary">Entrar no Ecossistema</button>
    </div>

    <!-- Choice Screen (Hidden) -->
    <div id="choiceScreen" class="container" style="display: none;">
        <h1 class="brand-logo">_NEO <div class="brand-dot"></div></h1>
        <p>Instale o aplicativo para uma experiência nativa,<br/> livre de barras ou continue pelo navegador.</p>
        <button id="installBtn" class="btn btn-primary" style="display: none; margin-bottom: 16px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Instalar Web App
        </button>
        <button id="continueBtn" class="btn btn-secondary">
            <span>Acessar via Navegador</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p style="font-size: 14px; font-weight: 500; letter-spacing: 0.5px;">INICIALIZANDO LIGAÇÃO...</p>
    </div>

    <script>
        const targetUrl = "https://amounts-sprint-sections-sword.trycloudflare.com";
        const MASTER_HASH = "6a99e3151f3977f175f1cb46975406de9710e49d4cffe84f4a7382a470d5aef3";
        
        const authScreen = document.getElementById('authScreen');
        const choiceScreen = document.getElementById('choiceScreen');
        const passInput = document.getElementById('passInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const installBtn = document.getElementById('installBtn');
        const continueBtn = document.getElementById('continueBtn');
        const loading = document.getElementById('loading');

        async function hash(str) {
            const en = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', en);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function showChoices() {
            authScreen.style.display = 'none';
            choiceScreen.style.display = 'block';
            if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
                goToNeo();
            }
        }

        async function handleLogin() {
            const hashedValue = await hash(passInput.value);
            if (hashedValue === MASTER_HASH) {
                localStorage.setItem('neo_auth', hashedValue);
                showChoices();
            } else {
                errorMsg.style.display = 'block';
                passInput.value = '';
                passInput.focus();
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        passInput.addEventListener('keypress', (e) => e.key === 'Enter' && handleLogin());

        // Check persistent session
        if (localStorage.getItem('neo_auth') === MASTER_HASH) {
            showChoices();
        }

        function goToNeo() {
            choiceScreen.style.opacity = '0';
            loading.style.display = 'flex';
            setTimeout(() => {
                document.body.style.margin = '0';
                document.body.innerHTML = '<iframe src="' + targetUrl + '" style="border: none; width: 100vw; height: 100vh; display: block; background: #0b0f19;" allow="microphone; camera; display-capture; fullscreen; clipboard-read; clipboard-write"></iframe>';
            }, 400);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW falhou: ', err));
            });
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                if (result.outcome === 'accepted') setTimeout(goToNeo, 1000);
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });

        continueBtn.addEventListener('click', goToNeo);
    </script>
</body>
</html>
